<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Thumbnail Generator</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-link"></i> Link Thumbnail Generator</h1>
            <p>Transform any link into a beautiful thumbnail preview</p>
        </header>

        <main>
            <div class="input-section">
                <div class="input-group">
                    <input type="url" id="urlInput" placeholder="Enter any URL (e.g., https://example.com)" required>
                    <button id="generateBtn" type="button">
                        <i class="fas fa-magic"></i> Generate Thumbnail
                    </button>
                </div>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <h2>Generated Thumbnail</h2>
                <div class="thumbnail-container" id="thumbnailContainer">
                    <!-- Thumbnail will be generated here -->
                </div>
                <div class="actions">
                    <button id="copyBtn" class="action-btn">
                        <i class="fas fa-copy"></i> Copy HTML
                    </button>
                    <button id="downloadBtn" class="action-btn">
                        <i class="fas fa-download"></i> Download Image
                    </button>
                    <button id="newBtn" class="action-btn">
                        <i class="fas fa-plus"></i> New Link
                    </button>
                </div>
            </div>

            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Generating thumbnail...</p>
            </div>

            <div class="error" id="error" style="display: none;">
                <i class="fas fa-exclamation-triangle"></i>
                <p id="errorMessage">An error occurred while generating the thumbnail.</p>
            </div>
        </main>

        <div class="examples">
            <h3>Try these examples:</h3>
            <div class="example-links">
                <button class="example-btn" data-url="https://github.com">GitHub</button>
                <button class="example-btn" data-url="https://stackoverflow.com">Stack Overflow</button>
                <button class="example-btn" data-url="https://medium.com">Medium</button>
                <button class="example-btn" data-url="https://dev.to">Dev.to</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
