<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>URL Shortener</h1>
            <p>Shorten your long URLs</p>
        </header>

        <main>
            <div class="form">
                <div class="input-group">
                    <label for="longUrl">Long URL</label>
                    <input type="url" id="longUrl" placeholder="https://example.com/very-long-url" required>
                </div>
                
                <div class="input-group">
                    <label for="customSlug">Custom slug (optional)</label>
                    <div class="slug-input">
                        <span class="domain">short.ly/</span>
                        <input type="text" id="customSlug" placeholder="my-link" maxlength="20">
                    </div>
                </div>

                <button id="shortenBtn">Shorten URL</button>
            </div>

            <div class="result" id="resultSection" style="display: none;">
                <h2>Your short link</h2>
                <div class="link-display">
                    <div class="short-url" id="shortUrlDisplay"></div>
                    <div class="original-url" id="originalUrlDisplay"></div>
                </div>
                
                <div class="actions">
                    <button id="copyBtn">Copy</button>
                    <button id="testBtn">Test</button>
                    <button id="newBtn">New Link</button>
                </div>
            </div>

            <div class="loading" id="loading" style="display: none;">
                <p>Creating short link...</p>
            </div>

            <div class="error" id="error" style="display: none;">
                <p id="errorMessage">An error occurred.</p>
            </div>
        </main>

        <div class="recent" id="recentLinks" style="display: none;">
            <h3>Recent links</h3>
            <div class="links-list" id="linksList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
